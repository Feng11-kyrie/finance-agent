name: 导出 Secrets（一次性）
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 导出密钥到文件
        env:
          AK: ${{ secrets.ANTHROPIC_API_KEY }}
          SK: ${{ secrets.SERVERCHAN_SENDKEY }}
          GS: ${{ secrets.GOOGLE_SHEET_ID }}
          GC: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          echo "ANTHROPIC_API_KEY=$AK" > secrets.txt
          echo "SERVERCHAN_SENDKEY=$SK" >> secrets.txt
          echo "GOOGLE_SHEET_ID=$GS" >> secrets.txt
          echo "GCP_SERVICE_ACCOUNT=$GC" >> secrets.txt
          echo "done"

      - uses: actions/upload-artifact@v4
        with:
          name: secrets
          path: secrets.txt
