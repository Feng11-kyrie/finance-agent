name: 每日智能分析报告

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00（周一至周五）
    - cron: '0 2 * * 1-5'
    # 北京时间 14:30 = UTC 06:30（周一至周五，收盘前30分钟）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - morning
          - afternoon

jobs:
  generate-report:
    name: 生成分析报告
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 确定报告类型
        id: report_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.report_type }}" = "auto" ]; then
              HOUR=$(date -u +%H)
              if [ $HOUR -lt 4 ]; then TYPE="morning"; else TYPE="afternoon"; fi
            else
              TYPE="${{ github.event.inputs.report_type }}"
            fi
          else
            HOUR=$(date -u +%H)
            if [ $HOUR -lt 4 ]; then TYPE="morning"; else TYPE="afternoon"; fi
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "📋 报告类型: $TYPE"

      - name: 生成报告并推送
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          REPORT_TYPE: ${{ steps.report_type.outputs.type }}
        run: |
          echo "🚀 开始生成 ${REPORT_TYPE} 报告..."
          python report_generator.py "$REPORT_TYPE"

      - name: 推送失败告警
        if: failure()
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            -d "title=❌ 金融研报推送失败" \
            -d "desp=## ⚠️ 报告生成/推送失败

          **时间：** $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          **失败步骤：** ${{ steps.generate.outcome }}
          **详情：** [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          请检查 API Key、Google Sheets 连接或网络。
          " 2>&1
          echo "📤 已发送失败告警"
