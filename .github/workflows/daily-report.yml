name: 每日智能分析报告

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00（周一至周五）
    - cron: '0 2 * * 1-5'
    # 北京时间 14:30 = UTC 06:30（周一至周五）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  morning-report:
    name: 早盘报告 (10:00)
    if: github.event.schedule == '0 2 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 诊断 API 连接
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
          import os, requests, json

          key = os.environ['ANTHROPIC_API_KEY']

          # 测试1: Anthropic兼容接口
          print('=== 测试1: Anthropic兼容接口 ===')
          try:
              r = requests.post('https://api.deepseek.com/anthropic/v1/messages',
                  headers={'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json'},
                  json={'model':'deepseek-chat','max_tokens':5,'messages':[{'role':'user','content':'hi'}]},
                  timeout=15)
              print(f'Status: {r.status_code}')
              print(f'Body: {r.text[:200]}')
          except Exception as e:
              print(f'Error: {e}')

          # 测试2: 原生OpenAI兼容接口
          print()
          print('=== 测试2: 原生API ===')
          try:
              r = requests.post('https://api.deepseek.com/v1/chat/completions',
                  headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'},
                  json={'model':'deepseek-chat','messages':[{'role':'user','content':'hi'}],'max_tokens':5},
                  timeout=15)
              print(f'Status: {r.status_code}')
              print(f'Body: {r.text[:200]}')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: 生成早盘报告
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python report_generator.py morning

  afternoon-report:
    name: 午盘报告 (14:30)
    if: github.event.schedule == '30 6 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成午盘报告
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python report_generator.py afternoon
