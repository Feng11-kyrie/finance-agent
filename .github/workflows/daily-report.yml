name: 每日智能分析报告

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00（周一至周五）
    - cron: '0 2 * * 1-5'
    # 北京时间 14:30 = UTC 06:30（周一至周五）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  morning-report:
    name: 早盘报告 (10:00)
    if: github.event.schedule == '0 2 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 诊断 API 连接
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          python3 -c "
          import os, requests
          key = os.environ.get('ANTHROPIC_API_KEY','')[:8]
          base = os.environ.get('ANTHROPIC_BASE_URL','')
          print(f'API Key: {key}...')
          print(f'Base URL: {base}')
          # 测试连接
          url = f'{base}/v1/messages'
          print(f'Full URL: {url}')
          try:
              r = requests.post(url,
                  headers={'x-api-key': os.environ['ANTHROPIC_API_KEY'], 'anthropic-version': '2023-06-01', 'content-type': 'application/json'},
                  json={'model':'deepseek-chat','max_tokens':5,'messages':[{'role':'user','content':'hi'}]},
                  timeout=15)
              print(f'Status: {r.status_code}')
              print(f'Body: {r.text[:300]}')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: 生成早盘报告
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python report_generator.py morning

  afternoon-report:
    name: 午盘报告 (14:30)
    if: github.event.schedule == '30 6 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成午盘报告
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python report_generator.py afternoon
