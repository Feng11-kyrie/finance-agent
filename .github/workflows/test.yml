name: 自动化测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 单元测试 (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install -r requirements.txt pytest
      - name: 运行测试
        run: python -m pytest tests/ -v
